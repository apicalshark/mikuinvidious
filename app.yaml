# Google App Engine configuration file

# The runtime environment for the application.
# We are using Python 3.12 as it is used in your Vercel deployment.
runtime: python312

# The entrypoint for the application. This command starts a Gunicorn server,
# which is a production-ready WSGI server. We use a Uvicorn worker
# to handle the asynchronous nature of the Flask application.
entrypoint: gunicorn --worker-class uvicorn.workers.UvicornWorker app:app

# Handlers define how incoming requests are routed to your application.
# This handler routes all traffic to your main app script.
handlers:
  - url: /.*
    script: auto

# Environment variables for the application.
# IMPORTANT: Replace the placeholder values below with your actual secrets.
# Do NOT commit this file with real secrets to your repository.
env_variables:
  # -- Redis Database --
  # Get this from your Upstash/Redis provider.
  REDIS_URL: "rediss://:your_password@your_host:your_port"

  # -- Admin Login --
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "your_admin_password"
  FLASK_SECRET_KEY: "your_long_random_secret_key"

  # -- Application Settings --
  # After your first deployment, replace this with your app's URL.
  # e.g., https://your-project-id.appspot.com
  SITE_URL: "https://your-app-url.appspot.com"

  # -- Proxy Settings --
  # Set PROXY_VIDEO to "false" to make it admin-only.
  # It is STRONGLY recommended to keep PROXY_IMAGE as "true".
  PROXY_VIDEO: "false"
  PROXY_IMAGE: "true"

  # -- Bilibili Credentials (Optional) --
  USE_CRED: "false"
  SESSDATA: ""
  BILI_JCT: ""
  BUVID3: ""
  DEDEUSERID: ""
  AC_TIME_VALUE: ""
