{% macro video_player(vid, vinfo, idx, supported_src, is_live=False) %}
<div id="player-wrapper" class="relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-2xl">
    <media-controller id="miku-player" class="w-full h-full">
        {% if is_live %}
            <video slot="media" id="player" poster="{{ vinfo['pic']|pic }}" playsinline crossorigin></video>
        {% else %}
            <video slot="media" id="player" src="/proxy/video/{{ vid }}_{{ idx }}_{{ supported_src[0]['quality'] }}" poster="{{ vinfo['pic']|pic }}" playsinline crossorigin preload="metadata"></video>
        {% endif %}

        <!-- Danmaku Container - Direct child of controller to manage persistence manually -->
        <div id="danmaku-container" class="absolute pointer-events-none z-10 overflow-hidden"></div>

        <!-- Quality Menu Layer - Direct child -->
        <div id="quality-menu" class="absolute opacity-0 pointer-events-none scale-95 transition-all origin-bottom-right z-50 p-2 min-w-[140px] rounded-xl shadow-2xl border border-white/10 bg-[#181818] pointer-events-auto">
            <div class="text-[10px] uppercase tracking-widest text-white/40 px-3 py-2 mb-1 font-bold">{{ '解析度'|translate }}</div>
            <div id="quality-list" class="flex flex-col gap-1 max-h-[300px] overflow-y-auto custom-scrollbar"></div>
        </div>

        <media-loading-indicator slot="centered-chrome" no-auto-hide class="w-16 h-12 z-20"></media-loading-indicator>
        
        <!-- Control Bar -->
        <media-control-bar class="w-full z-30">
            {% if is_live %}
                <media-play-button></media-play-button>
                <media-mute-button></media-mute-button>
                <media-volume-range></media-volume-range>
                
                <!-- Live Indicator -->
                <div class="flex items-center px-2 gap-2">
                    <div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                    <span class="text-[11px] font-bold uppercase tracking-wider text-white">{{ '直播'|translate }}</span>
                </div>

                <div class="flex-grow"></div>
            {% else %}
                <media-play-button></media-play-button>
                <media-seek-backward-button seek-offset="5"></media-seek-backward-button>
                <media-seek-forward-button seek-offset="5"></media-seek-forward-button>
                <media-mute-button></media-mute-button>
                <media-volume-range></media-volume-range>
                <media-time-display show-duration></media-time-display>
                <media-time-range></media-time-range>
            {% endif %}
            
            <!-- Custom buttons -->
            <button id="danmaku-toggle" title="{{ '切換彈幕'|translate }}" class="miku-control-btn">
                <i class="icon ion-md-easel"></i>
            </button>

            <button id="quality-btn" title="{{ '切換解析度'|translate }}" class="miku-control-btn px-2">
                <span id="current-quality-label" class="uppercase tracking-tight font-bold text-[11px]">自动</span>
            </button>

            {% if not is_live %}
            <media-playback-rate-button></media-playback-rate-button>
            {% endif %}
            <media-fullscreen-button></media-fullscreen-button>
        </media-control-bar>
    </media-controller>

    <script>
        window.supported_src = {{ supported_src|tojson }};
    </script>
</div>
{% endmacro %}
