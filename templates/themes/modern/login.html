{% extends 'themes/modern/base.html' %}

{% block head %}
<title>登录 - MikuInvidious</title>
{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
    <div class="bg-surface dark:bg-surface-variant/20 rounded-3xl p-8 md:p-12 shadow-lg ring-1 ring-surface-variant/20 max-w-md w-full space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-on-surface">管理员登录</h1>
            <p class="text-sm text-on-surface-variant">请输入您的凭证以继续</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/20 text-red-500 px-4 py-3 rounded-xl text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="space-y-6">
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-on-surface-variant mb-1">用户名</label>
                    <input type="text" id="username" name="username" required class="w-full px-4 py-3 rounded-xl bg-surface-variant/30 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary transition-all">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-on-surface-variant mb-1">密码</label>
                    <input type="password" id="password" name="password" required class="w-full px-4 py-3 rounded-xl bg-surface-variant/30 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary transition-all">
                </div>
            </div>

            <button type="submit" class="w-full py-3 rounded-xl bg-primary text-on-primary font-bold hover:bg-primary/90 transition-transform active:scale-95 shadow-md">
                登录
            </button>
        </form>
    </div>
</div>
{% endblock %}
